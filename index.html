<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED Matrix Parallel Row Shift Register Builder</title>
    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: #1e1e24;
            --border-color: #2f2f37;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --led-off: #334155;
            --led-on: #ef4444; 
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--panel-bg);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        header h1 span {
            color: var(--led-on);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .lang-toggle {
            background: #2d3748;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            display: flex;
            gap: 0.5rem;
            user-select: none;
            align-items: center;
        }

        .lang-btn {
            cursor: pointer;
            padding: 0.1rem 0.2rem;
            transition: color 0.2s, font-weight 0.2s;
        }

        .lang-btn.active {
            color: var(--accent-color);
            font-weight: 700;
        }

        .lang-btn:hover:not(.active) {
            color: var(--text-color);
        }

        .badge {
            background: #2d3748;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .main-container {
            display: grid;
            grid-template-columns: 320px 1fr 450px;
            flex: 1;
            overflow: hidden;
        }

        @media (max-width: 1200px) {
            .main-container {
                grid-template-columns: 300px 1fr;
                grid-template-rows: auto;
            }
            .code-panel {
                grid-column: span 2;
                height: 500px;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .sidebar, .canvas-panel, .code-panel {
                grid-column: span 1;
            }
            .header-controls {
                flex-direction: column;
                align-items: flex-end;
                gap: 0.5rem;
            }
        }

        .panel {
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .panel-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .panel-body {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #17171c;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input[type="number"], input[type="text"] {
            background-color: #0f0f11;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.6rem;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .pin-input {
            width: 60px;
            padding: 0.3rem !important;
            text-align: center;
            font-weight: bold;
            color: var(--accent-color) !important;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .info-box {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 6px;
            padding: 0.75rem;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .pin-container {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .pin-container::-webkit-scrollbar {
            width: 6px;
        }
        .pin-container::-webkit-scrollbar-track {
            background: #17171c; 
            border-radius: 4px;
        }
        .pin-container::-webkit-scrollbar-thumb {
            background: #3f3f46; 
            border-radius: 4px;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: #2d3748;
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #3a475c;
        }

        .btn-danger {
            background-color: #dc2626;
        }
        .btn-danger:hover {
            background-color: #b91c1c;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .canvas-panel {
            background-color: #141417;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            overflow: auto;
        }

        .canvas-toolbar {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            background: var(--panel-bg);
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .canvas-content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-bottom: auto; 
            gap: 1.5rem;
        }

        .timeline-container {
            width: 100%;
            max-width: 600px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            margin: 0;
        }

        .frame-status {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .matrix-outer-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .matrix-grid {
            display: grid;
            gap: 6px;
            background-color: var(--panel-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            user-select: none;
            min-width: 100px;
            min-height: 100px;
        }

        .led {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: var(--led-off);
            cursor: pointer;
            transition: background-color 0.15s, box-shadow 0.15s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }

        .led.active {
            background-color: var(--led-on);
            box-shadow: 0 0 10px var(--led-on), inset 0 1px 2px rgba(255,255,255,0.4);
        }

        .code-panel {
            border-right: none;
        }

        .code-container {
            flex: 1;
            position: relative;
            margin: 1.25rem;
            background-color: #0f0f11;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .code-header {
            background-color: #17171c;
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .code-scroll-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        pre {
            margin: 0;
            padding: 1rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #a7b5ca;
            white-space: pre-wrap;
        }

        .btn-view-more {
            background-color: #27272a;
            color: var(--accent-color);
            border: 1px dashed var(--accent-color);
            margin: 0 1rem 1rem 1rem;
            padding: 0.5rem;
            font-size: 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-view-more:hover {
            background-color: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
        }
    </style>
</head>
<body>

    <header>
        <h1><span>●</span> <span id="txt-app-title">LED Matrix Sketch Builder</span> </h1>
        <div class="header-controls">
            <div class="lang-toggle">
                <span id="btn-lang-en" class="lang-btn active">EN</span> | <span id="btn-lang-id" class="lang-btn">ID</span>
            </div>
            <div class="badge">Mateous's Tinkering</div>
        </div>
    </header>

    <div class="main-container">
        
        <div class="panel sidebar">
            <div class="panel-header" id="txt-panel-hw">Hardware Configuration</div>
            <div class="panel-body">
                
                <div class="form-group">
                    <label for="input-cols" id="txt-lbl-cols">LEDs per Row (X Columns)</label>
                    <input type="number" id="input-cols" value="16" min="8" max="128">
                </div>

                <div class="form-group">
                    <label for="input-rows" id="txt-lbl-rows">Total Rows (Y)</label>
                    <input type="number" id="input-rows" value="8" min="1" max="64">
                </div>

                <div class="info-box">
                    <strong id="txt-info-title">Data Distribution Info:</strong><br>
                    <span id="ic-count-info"></span>
                </div>

                <hr style="border: 0; border-top: 1px solid var(--border-color);">
                
                <p style="font-size: 0.8rem; font-weight: bold; color: var(--accent-color);" id="txt-bus-title">BUS CONTROL (Arduino Pin to Latch and Clock Shift Register)</p>
                <div class="form-group">
                    <label for="pin-latch" id="txt-lbl-latch">Shared Latch Pin (ST_CP)</label>
                    <input type="text" id="pin-latch" value="10">
                </div>
                
                <div class="form-group">
                    <label for="pin-clock" id="txt-lbl-clock">Shared Clock Pin (SH_CP)</label>
                    <input type="text" id="pin-clock" value="11">
                </div>

                <hr style="border: 0; border-top: 1px solid var(--border-color);">
                <p style="font-size: 0.8rem; font-weight: bold; color: var(--accent-color);" id="txt-data-title">DATA PINS (1 DS PIN PER ROW)</p>

                <div class="form-group">
                    <label id="txt-lbl-data-pin">Set Arduino Pin for each Row:</label>
                    <div id="dynamic-pins-container" class="pin-container">
                    </div>
                </div>

                <hr style="border: 0; border-top: 1px solid var(--border-color);">

                <div class="form-group">
                    <label for="frame-delay" id="txt-lbl-delay">Frame Animation Delay (ms)</label>
                    <input type="number" id="frame-delay" value="200" min="20">
                </div>

            </div>
        </div>

        <div class="canvas-panel">
            
            <div class="canvas-toolbar">
                <div class="btn-group" style="grid-template-columns: auto auto; gap: 0.5rem;">
                    <button class="btn btn-secondary" id="btn-clear">Clear All</button>
                    <button class="btn btn-secondary" id="btn-invert">Invert</button>
                </div>
            </div>

            <div class="canvas-content-wrapper">
                
                <div class="timeline-container">
                    <div class="frame-status">
                        <span id="frame-indicator">Frame: 1 / 1</span>
                        <span id="play-status" style="color: #10b981; display:none;">● Playing</span>
                    </div>
                    <div style="display: flex; gap: 0.5rem; justify-content: space-between;">
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="btn btn-secondary" id="btn-prev">◀ Prev</button>
                            <button class="btn btn-secondary" id="btn-next">Next ▶</button>
                        </div>
                        <button class="btn" id="btn-add-frame" title="Shortcut: CTRL + D">+ Add Frame</button>
                        <button class="btn btn-secondary" id="btn-play" style="background-color: #1e3a8a;">Play</button>
                        <button class="btn btn-danger" id="btn-del-frame" title="Shortcut: CTRL + S">Delete</button>
                    </div>
                </div>

                <div class="matrix-outer-container">
                    <div class="matrix-grid" id="led-matrix"></div>
                </div>

            </div>

        </div>

        <div class="panel code-panel">
            <div class="panel-header" id="txt-panel-code">
                Arduino Code Output
            </div>
            <div class="code-container">
                <div class="code-header">
                    <span style="font-size: 0.8rem; color: var(--text-muted);">matrix.ino</span>
                    <button class="btn" id="btn-copy" style="padding: 0.3rem 0.7rem; font-size: 0.8rem;">Copy Code</button>
                </div>
                <div class="code-scroll-area">
                    <pre><code id="code-output">Generating code...</code></pre>
                    <button class="btn-view-more" id="btn-view-more" style="display: none;">View More (+70 Lines)</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // LANGUAGE DICTIONARY
        const i18n = {
            en: {
                appTitle: "LED Matrix Sketch Builder",
                panelHw: "Hardware Configuration",
                lblCols: "LEDs per Row (X Columns)",
                lblRows: "Total Rows (Y)",
                infoTitle: "Data Distribution Info:",
                infoTotalIC: "Total 74HC595 ICs: ",
                infoChain: "ICs chained per row: ",
                infoPins: "Total Arduino DS Pins: ",
                busTitle: "BUS CONTROL (Arduino Pin to Latch and Clock Shift Register)",
                lblLatch: "Shared Latch Pin (ST_CP)",
                lblClock: "Shared Clock Pin (SH_CP)",
                dataTitle: "DATA PINS (1 DS PIN PER ROW)",
                lblDataPin: "Set Arduino Pin for each Row:",
                lblDelay: "Frame Animation Delay (ms)",
                dsRow: "DS Row",
                btnClear: "Clear All",
                btnInvert: "Invert",
                btnPrev: "◀ Prev",
                btnNext: "Next ▶",
                btnAddFrame: "+ Add Frame",
                btnPlay: "Play",
                btnPause: "Pause",
                btnDelFrame: "Delete",
                panelCode: "Arduino Code Output (Parallel Rows)",
                btnCopy: "Copy Code",
                viewMoreText: "View More",
                linesText: "Lines",
                showingText: "Showing",
                alertMinFrame: "At least 1 frame must remain!",
                alertCopyFail: "Failed to copy: ",
                alertManualCopy: "Failed to copy. Please select the text manually and press Ctrl+C.",
                playStatus: "● Playing",
                frameLabel: "Frame: ",
                tooltipAdd: "Shortcut: CTRL + D",
                tooltipDel: "Shortcut: CTRL + S",
                cDesc1: "// Latch and Clock Pins are connected to all shift registers\n",
                cDesc2: "// Multiple Data pins are connected to each shift register rows\n",
                cDesc3: "// Data pin only connected to other shift register within the same rows\n\n",
                cDesc4: "    // Sending data via parallel bit-banging for all rows\n",
                cDesc5: "        // Writing bits from array to each row's Data Pin\n",
                cDesc6: "        digitalWrite(CLOCK_PIN, HIGH); // Shift bit to ICs\n",
                cDesc7: "    digitalWrite(LATCH_PIN, HIGH); // Display on Matrix\n\n",
                cDesc8: "    // Frame display delay (no fast scanning needed!)\n"
            },
            id: {
                appTitle: "LED Matrix Sketch Builder",
                panelHw: "Konfigurasi Hardware",
                lblCols: "Jumlah LED per Baris (Kolom X)",
                lblRows: "Jumlah Total Baris (Y)",
                infoTitle: "Informasi Distribusi Data:",
                infoTotalIC: "Total IC 74HC595: ",
                infoChain: "Rantai IC per Baris: ",
                infoPins: "Total Pin DS Arduino: ",
                busTitle: "BUS CONTROL (Arduino Pin ke Latch dan Clock Shift Register)",
                lblLatch: "Latch Pin Bersama (ST_CP)",
                lblClock: "Clock Pin Bersama (SH_CP)",
                dataTitle: "DATA PINS (1 PIN DS PER BARIS)",
                lblDataPin: "Tentukan Pin Arduino untuk tiap Baris:",
                lblDelay: "Delay Animasi per Frame (ms)",
                dsRow: "DS Baris",
                btnClear: "Bersihkan",
                btnInvert: "Balikkan (Invert)",
                btnPrev: "◀ Prev",
                btnNext: "Next ▶",
                btnAddFrame: "+ Tambah Frame",
                btnPlay: "Mulai",
                btnPause: "Jeda",
                btnDelFrame: "Hapus",
                panelCode: "Arduino Code Output (Parallel Rows)",
                btnCopy: "Salin Kode",
                viewMoreText: "Tampilkan Lagi",
                linesText: "Baris",
                showingText: "Menampilkan",
                alertMinFrame: "Minimal harus tersisa 1 Frame!",
                alertCopyFail: "Gagal menyalin: ",
                alertManualCopy: "Gagal menyalin otomatis. Silakan blok teks manual dan tekan Ctrl+C.",
                playStatus: "● Bermain",
                frameLabel: "Frame: ",
                tooltipAdd: "Pintasan: CTRL + D",
                tooltipDel: "Pintasan: CTRL + S",
                cDesc1: "// Pin Latch dan Clock dihubungkan ke semua shift register\n",
                cDesc2: "// Beberapa pin data dihubungkan ke setiap baris register geser\n",
                cDesc3: "// Pin data hanya terhubung ke register geser lain dalam baris yang sama\n\n",
                cDesc4: "    // Mengirim data secara bit-banging paralel untuk seluruh baris\n",
                cDesc5: "        // Menulis bit dari array ke masing-masing Data Pin baris\n",
                cDesc6: "        digitalWrite(CLOCK_PIN, HIGH); // Shift bit ke IC\n",
                cDesc7: "    digitalWrite(LATCH_PIN, HIGH); // Tampilkan di Matrix\n\n",
                cDesc8: "    // Delay tampilan frame (tidak perlu scanning berulang!)\n"
            }
        };

        let currentLang = 'en';

        document.addEventListener("DOMContentLoaded", function() {
            try {
                // Variabel Global
                let cols = 16;
                let rows = 8;
                let frames = [];
                let currentFrameIndex = 0;
                let isDrawing = false;
                let drawMode = true; 
                let playInterval = null;
                
                let currentFullCode = "";
                let visibleLinesLimit = 70; 
                
                let dataPinsConfig = []; 

                // DOM Elements
                const matrixGrid = document.getElementById('led-matrix');
                const inputCols = document.getElementById('input-cols');
                const inputRows = document.getElementById('input-rows');
                const icCountInfo = document.getElementById('ic-count-info');
                const dynamicPinsContainer = document.getElementById('dynamic-pins-container');
                const codeOutput = document.getElementById('code-output');
                const btnViewMore = document.getElementById('btn-view-more');
                
                const pinLatch = document.getElementById('pin-latch');
                const pinClock = document.getElementById('pin-clock');
                const frameDelay = document.getElementById('frame-delay');

                // Language Toggles
                const btnLangEn = document.getElementById('btn-lang-en');
                const btnLangId = document.getElementById('btn-lang-id');

                function applyTranslation() {
                    const t = i18n[currentLang];
                    document.documentElement.lang = currentLang;
                    
                    document.getElementById('txt-app-title').innerText = t.appTitle;
                    document.getElementById('txt-panel-hw').innerText = t.panelHw;
                    document.getElementById('txt-lbl-cols').innerText = t.lblCols;
                    document.getElementById('txt-lbl-rows').innerText = t.lblRows;
                    document.getElementById('txt-info-title').innerText = t.infoTitle;
                    document.getElementById('txt-bus-title').innerText = t.busTitle;
                    document.getElementById('txt-lbl-latch').innerText = t.lblLatch;
                    document.getElementById('txt-lbl-clock').innerText = t.lblClock;
                    document.getElementById('txt-data-title').innerText = t.dataTitle;
                    document.getElementById('txt-lbl-data-pin').innerText = t.lblDataPin;
                    document.getElementById('txt-lbl-delay').innerText = t.lblDelay;
                    document.getElementById('txt-panel-code').innerText = t.panelCode;
                    
                    document.getElementById('btn-clear').innerText = t.btnClear;
                    document.getElementById('btn-invert').innerText = t.btnInvert;
                    document.getElementById('btn-prev').innerText = t.btnPrev;
                    document.getElementById('btn-next').innerText = t.btnNext;
                    
                    let btnAddFrame = document.getElementById('btn-add-frame');
                    btnAddFrame.innerText = t.btnAddFrame;
                    btnAddFrame.title = t.tooltipAdd;

                    let btnDelFrame = document.getElementById('btn-del-frame');
                    btnDelFrame.innerText = t.btnDelFrame;
                    btnDelFrame.title = t.tooltipDel;

                    document.getElementById('btn-copy').innerText = t.btnCopy;
                    
                    if(playInterval) {
                        document.getElementById('btn-play').innerText = t.btnPause;
                        document.getElementById('play-status').innerText = t.playStatus;
                    } else {
                        document.getElementById('btn-play').innerText = t.btnPlay;
                    }
                    
                    updateICInfo();
                    renderDynamicPinInputs();
                    updateTimelineUI();
                    renderCodeOutput();
                    generateArduinoCode();
                }

                btnLangEn.addEventListener('click', function() {
                    currentLang = 'en';
                    btnLangEn.classList.add('active');
                    btnLangId.classList.remove('active');
                    applyTranslation();
                });

                btnLangId.addEventListener('click', function() {
                    currentLang = 'id';
                    btnLangId.classList.add('active');
                    btnLangEn.classList.remove('active');
                    applyTranslation();
                });

                function updateICInfo() {
                    let icPerRow = Math.ceil(cols / 8);
                    let totalIC = icPerRow * rows;
                    let t = i18n[currentLang];
                    icCountInfo.innerHTML = "• " + t.infoTotalIC + totalIC + " pcs<br>• " + t.infoChain + icPerRow + " pcs<br>• " + t.infoPins + rows + " Pin";
                }

                function initApp() {
                    let newCols = parseInt(inputCols.value) || 16;
                    let newRows = parseInt(inputRows.value) || 8;
                    
                    if(newCols !== cols || newRows !== rows || frames.length === 0) {
                        cols = newCols;
                        rows = newRows;
                        frames = [createNewFrameBuffer(rows, cols)];
                        currentFrameIndex = 0;
                    }

                    visibleLinesLimit = 70;

                    if (dataPinsConfig.length === 0) {
                        for(let i = 0; i < rows; i++) dataPinsConfig.push(i + 2);
                    } else if (dataPinsConfig.length < rows) {
                        let lastPin = parseInt(dataPinsConfig[dataPinsConfig.length - 1]) || 2;
                        for(let i = dataPinsConfig.length; i < rows; i++) {
                            lastPin++;
                            dataPinsConfig.push(lastPin);
                        }
                    } else if (dataPinsConfig.length > rows) {
                        dataPinsConfig = dataPinsConfig.slice(0, rows);
                    }

                    applyTranslation(); 
                    renderMatrixUI();
                }

                function renderDynamicPinInputs() {
                    const t = i18n[currentLang];
                    dynamicPinsContainer.innerHTML = '';
                    for(let i = 0; i < rows; i++) {
                        let rowDiv = document.createElement('div');
                        rowDiv.className = 'form-group-row';
                        
                        let label = document.createElement('label');
                        label.innerText = t.dsRow + ' ' + (i + 1);
                        label.style.color = '#e2e8f0';
                        
                        let input = document.createElement('input');
                        input.type = 'text';
                        input.className = 'pin-input';
                        input.value = dataPinsConfig[i];
                        
                        input.addEventListener('input', function() {
                            dataPinsConfig[i] = this.value;
                            generateArduinoCode();
                        });

                        rowDiv.appendChild(label);
                        rowDiv.appendChild(input);
                        dynamicPinsContainer.appendChild(rowDiv);
                    }
                }

                function createNewFrameBuffer(r, c) {
                    let frame = [];
                    for(let i = 0; i < r; i++) {
                        let rowArray = [];
                        for(let j = 0; j < c; j++) {
                            rowArray.push(0);
                        }
                        frame.push(rowArray);
                    }
                    return frame;
                }

                function renderMatrixUI() {
                    matrixGrid.innerHTML = '';
                    matrixGrid.style.gridTemplateColumns = "repeat(" + cols + ", 24px)";
                    
                    let currentFrame = frames[currentFrameIndex];

                    for (let r = 0; r < rows; r++) {
                        for (let c = 0; c < cols; c++) {
                            let led = document.createElement('div');
                            led.className = 'led';
                            
                            if (currentFrame[r] && currentFrame[r][c] === 1) {
                                led.classList.add('active');
                            }

                            led.addEventListener('mousedown', function(e) {
                                e.preventDefault();
                                isDrawing = true;
                                drawMode = !led.classList.contains('active');
                                toggleLED(led, r, c, drawMode);
                            });

                            led.addEventListener('mouseenter', function() {
                                if (isDrawing) {
                                    toggleLED(led, r, c, drawMode);
                                }
                            });

                            matrixGrid.appendChild(led);
                        }
                    }
                }

                function toggleLED(ledElement, r, c, state) {
                    if (state) {
                        ledElement.classList.add('active');
                        frames[currentFrameIndex][r][c] = 1;
                    } else {
                        ledElement.classList.remove('active');
                        frames[currentFrameIndex][r][c] = 0;
                    }
                    generateArduinoCode();
                }

                window.addEventListener('mouseup', function() {
                    isDrawing = false;
                });

                matrixGrid.addEventListener('dragstart', function(e) {
                    e.preventDefault();
                });

                function renderCodeOutput() {
                    let lines = currentFullCode.split('\n');
                    let t = i18n[currentLang];
                    
                    if (lines.length <= visibleLinesLimit) {
                        codeOutput.innerText = currentFullCode;
                        btnViewMore.style.display = 'none';
                    } else {
                        let visibleLines = lines.slice(0, visibleLinesLimit);
                        codeOutput.innerText = visibleLines.join('\n') + "\n";
                        btnViewMore.style.display = 'block';
                        btnViewMore.innerText = t.viewMoreText + " (+70 " + t.linesText + ") [" + t.showingText + " " + visibleLinesLimit + "/" + lines.length + "]";
                    }
                }

                btnViewMore.addEventListener('click', function() {
                    visibleLinesLimit += 70; 
                    renderCodeOutput();
                });

                function generateArduinoCode() {
                    let latch = pinLatch.value || "10";
                    let clock = pinClock.value || "11";
                    let delayTime = frameDelay.value || "200";
                    
                    let totalFrames = frames.length;
                    let bytesPerRow = Math.ceil(cols / 8); 
                    
                    let t = i18n[currentLang];

                    let code = t.cDesc1 + t.cDesc2 + t.cDesc3;
                    code += "#define LATCH_PIN " + latch + "\n";
                    code += "#define CLOCK_PIN " + clock + "\n\n";
                    
                    code += "const int MATRIX_ROWS = " + rows + ";\n";
                    code += "const int MATRIX_COLS = " + cols + ";\n";
                    code += "const int FRAMES_COUNT = " + totalFrames + ";\n";
                    code += "const int BYTES_PER_ROW = " + bytesPerRow + ";\n\n";

                    let safePins = dataPinsConfig.map(p => (p.toString().trim() === "" ? "?" : p));
                    code += "const int DATA_PINS[MATRIX_ROWS] = {" + safePins.join(', ') + "};\n\n";

                    code += "const byte ANIMATION_DATA[FRAMES_COUNT][MATRIX_ROWS][BYTES_PER_ROW] PROGMEM = {\n";

                    for (let fIdx = 0; fIdx < frames.length; fIdx++) {
                        let frame = frames[fIdx];
                        code += "  { // Frame " + (fIdx + 1) + "\n";
                        
                        for (let r = 0; r < rows; r++) {
                            code += "    {";
                            let rowBytes = [];
                            
                            for (let b = 0; b < bytesPerRow; b++) {
                                let byteString = "";
                                for (let bit = 0; bit < 8; bit++) {
                                    let colIndex = b * 8 + bit;
                                    if (colIndex < cols) {
                                        byteString += frame[r][colIndex];
                                    } else {
                                        byteString += "0"; 
                                    }
                                }
                                let hexNumber = parseInt(byteString, 2).toString(16).toUpperCase();
                                if(hexNumber.length < 2) hexNumber = "0" + hexNumber;
                                rowBytes.push("0x" + hexNumber);
                            }
                            
                            code += rowBytes.join(', ');
                            code += (r === rows - 1) ? "}\n" : "},\n";
                        }
                        code += (fIdx === totalFrames - 1) ? "  }\n" : "  },\n";
                    }
                    code += "};\n\n";

                    code += "void setup() {\n";
                    code += "  pinMode(LATCH_PIN, OUTPUT);\n";
                    code += "  pinMode(CLOCK_PIN, OUTPUT);\n";
                    code += "  for (int i = 0; i < MATRIX_ROWS; i++) {\n";
                    code += "    pinMode(DATA_PINS[i], OUTPUT);\n";
                    code += "    digitalWrite(DATA_PINS[i], LOW);\n";
                    code += "  }\n";
                    code += "}\n\n";

                    code += "void loop() {\n";
                    code += "  for (int currentFrame = 0; currentFrame < FRAMES_COUNT; currentFrame++) {\n";
                    code += "    \n";
                    code += "    digitalWrite(LATCH_PIN, LOW);\n\n";
                    code += t.cDesc4;
                    code += "    for (int b = BYTES_PER_ROW - 1; b >= 0; b--) {\n";
                    code += "      for (int bit = 7; bit >= 0; bit--) {\n";
                    code += "        digitalWrite(CLOCK_PIN, LOW);\n\n";
                    code += t.cDesc5;
                    code += "        for (int r = 0; r < MATRIX_ROWS; r++) {\n";
                    code += "          byte rowData = pgm_read_byte(&(ANIMATION_DATA[currentFrame][r][b]));\n";
                    code += "          bool bitValue = (rowData >> bit) & 0x01;\n";
                    code += "          digitalWrite(DATA_PINS[r], bitValue);\n";
                    code += "        }\n\n";
                    code += t.cDesc6;
                    code += "      }\n";
                    code += "    }\n\n";
                    code += t.cDesc7;
                    code += t.cDesc8;
                    code += "    delay(" + delayTime + ");\n";
                    code += "  }\n";
                    code += "}\n";
                    code += "//:3\n";

                    currentFullCode = code;
                    renderCodeOutput();
                }

                function updateTimelineUI() {
                    let t = i18n[currentLang];
                    document.getElementById('frame-indicator').innerText = t.frameLabel + (currentFrameIndex + 1) + " / " + frames.length;
                }

                // SHORTCUT LISTENER (Mencegah Bookmark & Save default browser)
                document.addEventListener('keydown', function(e) {
                    // Deteksi CTRL + D
                    if (e.ctrlKey && (e.key === 'd' || e.key === 'D')) {
                        e.preventDefault(); 
                        document.getElementById('btn-add-frame').click();
                    }
                    // Deteksi CTRL + S
                    if (e.ctrlKey && (e.key === 's' || e.key === 'S')) {
                        e.preventDefault(); 
                        document.getElementById('btn-del-frame').click();
                    }
                });

                document.getElementById('btn-add-frame').addEventListener('click', function() {
                    let currentPattern = frames[currentFrameIndex];
                    let clonedPattern = [];
                    for (let i = 0; i < rows; i++) {
                        let newRow = [];
                        for(let j = 0; j < cols; j++) {
                            newRow.push(currentPattern[i][j]);
                        }
                        clonedPattern.push(newRow);
                    }
                    frames.splice(currentFrameIndex + 1, 0, clonedPattern);
                    currentFrameIndex++;
                    visibleLinesLimit = 70; 
                    renderMatrixUI();
                    updateTimelineUI();
                    generateArduinoCode();
                });

                document.getElementById('btn-next').addEventListener('click', function() {
                    if (currentFrameIndex < frames.length - 1) {
                        currentFrameIndex++;
                        renderMatrixUI();
                        updateTimelineUI();
                    }
                });

                document.getElementById('btn-prev').addEventListener('click', function() {
                    if (currentFrameIndex > 0) {
                        currentFrameIndex--;
                        renderMatrixUI();
                        updateTimelineUI();
                    }
                });

                document.getElementById('btn-del-frame').addEventListener('click', function() {
                    let t = i18n[currentLang];
                    if (frames.length > 1) {
                        frames.splice(currentFrameIndex, 1);
                        if (currentFrameIndex >= frames.length) {
                            currentFrameIndex = frames.length - 1;
                        }
                        visibleLinesLimit = 70; 
                        renderMatrixUI();
                        updateTimelineUI();
                        generateArduinoCode();
                    } else {
                        alert(t.alertMinFrame);
                    }
                });

                document.getElementById('btn-play').addEventListener('click', function() {
                    let t = i18n[currentLang];
                    let statusIndicator = document.getElementById('play-status');
                    if (playInterval) {
                        clearInterval(playInterval);
                        playInterval = null;
                        this.innerText = t.btnPlay;
                        this.style.backgroundColor = "#1e3a8a";
                        statusIndicator.style.display = "none";
                    } else {
                        this.innerText = t.btnPause;
                        this.style.backgroundColor = "#ea580c";
                        statusIndicator.style.display = "inline";
                        statusIndicator.innerText = t.playStatus;
                        let delay = parseInt(frameDelay.value) || 200;
                        playInterval = setInterval(function() {
                            currentFrameIndex = (currentFrameIndex + 1) % frames.length;
                            renderMatrixUI();
                            updateTimelineUI();
                        }, delay);
                    }
                });

                document.getElementById('btn-clear').addEventListener('click', function() {
                    frames[currentFrameIndex] = createNewFrameBuffer(rows, cols);
                    renderMatrixUI();
                    generateArduinoCode();
                });

                document.getElementById('btn-invert').addEventListener('click', function() {
                    for (let r = 0; r < rows; r++) {
                        for (let c = 0; c < cols; c++) {
                            frames[currentFrameIndex][r][c] = frames[currentFrameIndex][r][c] === 1 ? 0 : 1;
                        }
                    }
                    renderMatrixUI();
                    generateArduinoCode();
                });

                inputCols.addEventListener('change', initApp);
                inputRows.addEventListener('change', initApp); 
                pinLatch.addEventListener('input', generateArduinoCode);
                pinClock.addEventListener('input', generateArduinoCode);
                frameDelay.addEventListener('input', generateArduinoCode);

                document.getElementById('btn-copy').addEventListener('click', function() {
                    let codeText = currentFullCode; 
                    let t = i18n[currentLang];
                    let copyBtn = document.getElementById('btn-copy');
                    
                    function successCopy() {
                        copyBtn.innerText = "Copied!";
                        copyBtn.style.backgroundColor = "#10b981"; 
                        setTimeout(function() {
                            copyBtn.innerText = t.btnCopy;
                            copyBtn.style.backgroundColor = "#3b82f6";
                        }, 2000);
                    }
                    if (navigator.clipboard && window.isSecureContext) {
                        navigator.clipboard.writeText(codeText).then(successCopy).catch(function(e) {
                            alert(t.alertCopyFail + e.message);
                        });
                    } else {
                        let textArea = document.createElement("textarea");
                        textArea.value = codeText;
                        textArea.style.position = "fixed";
                        textArea.style.left = "-999999px";
                        document.body.appendChild(textArea);
                        textArea.focus();
                        textArea.select();
                        try {
                            document.execCommand('copy');
                            successCopy();
                        } catch (err) {
                            alert(t.alertManualCopy);
                        }
                        textArea.remove();
                    }
                });

                initApp(); 

            } catch (error) {
                document.body.innerHTML = "<div style='color: white; background: #dc2626; padding: 2rem; margin: 2rem; border-radius: 10px; font-family: sans-serif;'><h2>⚠️ Terjadi Hambatan Sistem</h2><p>Detail Error:</p><pre style='background:#1a1a1a; padding:1rem; color:#ffb3b3; overflow-x:auto;'>" + error.stack + "</pre></div>";
            }
        });
    </script>
</body>
</html>
